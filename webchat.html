<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线客服</title>
<style>
  :root {
    --accent: #0F766E;
    --accent-dark: #0B5C56;
    --bg: #F3F4F1;
    --card: #FFFFFF;
    --text: #1F2937;
    --text-light: #6B7280;
    --bubble-bot: #F1F5F4;
    --bubble-user: #0F766E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .chat-card {
    width: 100%;
    max-width: 420px;
    height: 640px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-header {
    background: var(--accent);
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .chat-header .info .name {
    font-weight: 600;
    font-size: 15px;
  }
  .chat-header .info .status {
    font-size: 12px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chat-header .info .status::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ADE80;
    display: inline-block;
  }
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-row {
    display: flex;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }
  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--bubble-user);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bubble-bot);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-light);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }
  .chat-input {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid #EEEEEE;
    background: var(--card);
  }
  .chat-input input {
    flex: 1;
    border: none;
    outline: none;
    background: var(--bg);
    padding: 11px 16px;
    border-radius: 999px;
    font-size: 14px;
    color: var(--text);
  }
  .chat-input input::placeholder { color: var(--text-light); }
  .chat-input button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .chat-input button:hover { background: var(--accent-dark); }
  .chat-input button:disabled { opacity: 0.5; cursor: default; }

  .chat-body::-webkit-scrollbar { width: 5px; }
  .chat-body::-webkit-scrollbar-thumb { background: #DDD; border-radius: 10px; }
</style>
</head>
<body>

<div class="chat-card">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name">在线客服</div>
      <div class="status">在线</div>
    </div>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <div class="chat-input">
    <input id="input" placeholder="输入消息..." autocomplete="off" />
    <button id="sendBtn" onclick="send()" aria-label="发送">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M2 12L21 3L15 21L11 13L2 12Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_URL = 'https://wenwen1949-bot-2.onrender.com/api/chat';
  const userId = 'web_' + Math.random().toString(36).slice(2, 10);

  const chatBody = document.getElementById('chatBody');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  addMsg('你好！欢迎咨询 👋 有什么可以帮你的？', 'bot');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typingEl = showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, text })
      });
      const data = await res.json();
      typingEl.remove();
      addMsg(data.reply, 'bot');
    } catch (err) {
      typingEl.remove();
      addMsg('⚠️ 连接失败，请稍后再试。', 'bot');
    }
    sendBtn.disabled = false;
  }

  function addMsg(text, who) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + who;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + who;
    bubble.textContent = text;
    row.appendChild(bubble);
    chatBody.appendChild(row);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    chatBody.appendChild(row);
    chatBody.scrollTop = chatBody.scrollHeight;
    return row;
  }
</script>

</body>
</html>
