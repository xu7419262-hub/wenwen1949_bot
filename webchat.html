<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>测试聊天</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; }
  #chatBox { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
  .msg { margin: 6px 0; }
  .user { text-align: right; color: #333; }
  .bot { text-align: left; color: #0a7; }
  input { width: 75%; padding: 8px; }
  button { padding: 8px 16px; }
</style>
</head>
<body>
  <h3>网页聊天测试</h3>
  <div id="chatBox"></div>
  <input id="input" placeholder="输入消息..." />
  <button onclick="send()">发送</button>

<script>
  // 换成你自己的 Render 网址
  const API_URL = 'https://wenwen1949-bot-2.onrender.com/api/chat';
  const userId = 'test_user_' + Math.random().toString(36).slice(2, 8);

  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, text })
    });
    const data = await res.json();
    addMsg(data.reply, 'bot');
  }

  function addMsg(text, cls) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
